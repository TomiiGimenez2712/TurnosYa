<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0" name="viewport" />
    <title>Panel Administrativo - Turnos YA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { "brand": "#22c55e", "surface": "#f8fafc", "dark": "#0f172a" }, fontFamily: { "sans": ["Inter", "sans-serif"] } } } }
    </script>
</head>
<body class="bg-surface font-sans text-dark antialiased">
    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <span class="text-lg font-extrabold flex items-center gap-2"><span class="material-symbols-rounded text-brand">stadium</span> Reservas (Admin)</span>
            <div class="flex items-center gap-3">
                <button onclick="window.location.href='configuracion.html'" class="text-sm font-bold text-gray-600 hover:text-gray-900 bg-gray-100 px-3 py-1.5 rounded-lg transition-colors border border-gray-200 hidden sm:block">Configuración</button>
                <button onclick="window.location.href='configuracion.html'" class="text-gray-600 bg-gray-100 p-1.5 rounded-lg sm:hidden"><span class="material-symbols-rounded block">settings</span></button>
                <button onclick="window.cerrarSesion()" class="text-sm font-bold text-red-600 hover:text-red-700 bg-red-50 px-3 py-1.5 rounded-lg transition-colors border border-red-100">Cerrar Sesión</button>
            </div>
        </div>
    </nav>
    <main class="max-w-5xl mx-auto px-4 py-8">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <h2 class="text-2xl font-bold">Agenda de Hoy</h2>
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <input type="date" id="admin-date" class="flex-1 sm:flex-none border border-gray-200 bg-white shadow-sm rounded-xl px-4 py-2 font-bold text-gray-700 focus:outline-none focus:ring-2 focus:ring-brand" onchange="window.cargarReservas()">
                <button onclick="window.location.href='index.html'" class="bg-brand text-white hover:bg-green-500 rounded-xl px-4 py-2 text-sm font-bold flex items-center gap-1 shadow-sm transition-colors" title="Ir al calendario para agendar">
                    <span class="material-symbols-rounded text-sm">add</span> Agendar
                </button>
            </div>
        </div>
        <div id="admin-bookings" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
            <!-- Bookings populate here -->
        </div>
    </main>
    <script type="module">
        import { AuthService } from '../capaDeLogica/authService.js';
        import { CanchaController } from '../capaDeLogica/canchaController.js';
        import { UI } from './ui.js';

        // Variables Globales seguras
        let offset;

        window.addEventListener('load', async () => {
            await AuthService.requireAuth('login.html');
            
            const today = new Date();
            offset = today.getTimezoneOffset() * 60000;
            const localDate = new Date(today.getTime() - offset).toISOString().split('T')[0];
            
            document.getElementById('admin-date').value = localDate;
            window.cargarReservas();
        });

        window.cerrarSesion = async () => {
            await AuthService.logout();
            window.location.href = 'login.html';
        };

        window.cargarReservas = async () => {
            const dateStr = document.getElementById('admin-date').value;
            const container = document.getElementById('admin-bookings');
            container.innerHTML = "<p class='col-span-full text-center text-gray-400 py-10 font-medium flex justify-center items-center gap-2'><span class='material-symbols-rounded animate-spin'>sync</span> Cargando agenda...</p>";

            const reservas = await CanchaController.obtenerReservasDelDia(dateStr);

            if (!reservas) {
                container.innerHTML = "<p class='col-span-full text-center text-red-500 py-10 font-medium'>Error obteniendo reservas de la base protegida.</p>";
                return;
            }

            if (reservas.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-16 bg-white rounded-3xl border border-gray-100 shadow-sm">
                        <span class="material-symbols-rounded text-5xl text-gray-300 block mb-2">event_busy</span>
                        <p class='text-gray-500 font-medium'>Vaya, no hay turnos agendados para este día.</p>
                    </div>`;
                return;
            }

            container.innerHTML = reservas.map(r => `
                <div class="bg-white p-5 rounded-2xl shadow-sm flex flex-col justify-between border ${r.estado === 'pendiente_pago' ? 'border-amber-400/50 shadow-amber-400/10' : 'border-gray-100'} hover:shadow-md transition-shadow relative">
                    <button onclick="window.eliminarDato('${r.id}')" class="absolute top-3 right-3 text-red-400 hover:text-red-600 hover:bg-red-50 p-1.5 rounded-full transition-colors" title="Cancelar Turno">
                        <span class="material-symbols-rounded block text-[18px]">delete</span>
                    </button>
                    <div class="flex items-center gap-4 mb-3">
                        <div class="${r.estado === 'pendiente_pago' ? 'bg-amber-50 text-amber-600' : 'bg-blue-50 text-blue-600'} font-black text-xl p-3 px-4 rounded-xl flex flex-col items-center">
                            ${r.hora}
                        </div>
                        <div>
                            <p class="font-bold text-gray-900 leading-tight pr-6">${r.canchas.nombre}</p>
                            <div class="flex flex-col items-start gap-1 mt-1">
                                <span class="inline-block px-2 py-0.5 bg-gray-100 text-gray-600 font-bold text-[10px] rounded uppercase tracking-wider">
                                    Precio: $${r.precio}
                                </span>
                                ${
                                    r.estado === 'pendiente_pago' 
                                    ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 bg-amber-100 text-amber-700 font-bold text-[10px] rounded uppercase tracking-wider"><span class="material-symbols-rounded text-[12px] animate-pulse">schedule</span> FALTA PAGO</span>`
                                    : `<span class="inline-flex items-center gap-1 px-2 py-0.5 bg-green-100 text-green-700 font-bold text-[10px] rounded uppercase tracking-wider"><span class="material-symbols-rounded text-[12px]">check_circle</span> ABONADO</span>`
                                }
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 mt-auto">
                        <p class="text-xs text-gray-600 font-medium flex items-center gap-1.5 mb-2">
                            <span class="material-symbols-rounded text-[14px] text-gray-400">person</span> 
                            ${r.jugadores.nombre || 'Desconocido'}
                        </p>
                        <div class="flex gap-2">
                            <a href="https://wa.me/${(r.jugadores.telefono || '').replace(/\D/g, '')}" target="_blank" class="flex-1 bg-[#25D366]/10 text-[#075E54] hover:bg-[#25D366]/20 py-1.5 rounded-lg flex items-center justify-center gap-1 text-xs font-bold transition-colors">
                                <span class="material-symbols-rounded text-[14px]">chat</span> WhatsApp
                            </a>
                            ${
                                r.estado === 'pendiente_pago'
                                ? `
                                <button onclick="window.confirmarPago('${r.id}')" class="flex-2 bg-emerald-500 text-white hover:bg-emerald-600 py-1.5 px-3 rounded-lg flex items-center justify-center gap-1 text-xs font-bold transition-colors">
                                    <span class="material-symbols-rounded text-[14px]">payments</span> Aprobar Pago
                                </button>
                                `
                                : ``
                            }
                        </div>
                    </div>
                </div>
            `).join('');
        };

        window.eliminarDato = (id) => {
            UI.confirm(
                "¿Estás 100% seguro de cancelar y eliminar este turno de la agenda? Esta acción es irreversible.",
                async () => {
                    const result = await CanchaController.eliminarReserva(id);
                    if(result.success) {
                        window.cargarReservas();
                    } else {
                        UI.alert("Error RLS: " + result.error, "Error de Sistema", "error");
                    }
                },
                "Cancelar Turno"
            );
        };

        window.confirmarPago = (id) => {
            UI.confirm(
                "¿Confirmar que esta reserva ya está pagada? Esto la marcará en verde.",
                async () => {
                    const result = await CanchaController.confirmarPago(id);
                    if(result.success) {
                        window.cargarReservas();
                    } else {
                        UI.alert("Error actualizando: " + result.error, "Error", "error");
                    }
                },
                "Verificar Pago"
            );
        };
    </script>
</body>
</html>
